#Spring config properties
spring.config.import=optional:file:.env[.properties]


# Configuracao de conexao com o banco de dados
spring.datasource.url=jdbc:postgresql://localhost:5432/${KEY_POSTGRES_DB_NAME}
spring.datasource.username=${KEY_POSTGRES_USER}
spring.datasource.password=${KEY_POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracao do JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true